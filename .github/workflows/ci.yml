name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# scolta-django depends on the `scolta` binding via a path source
# ([tool.uv.sources] scolta = { path = "../scolta-python" }). In CI we therefore
# check out BOTH repos as siblings so that relative path resolves:
#
#     <workspace>/scolta-django   (this repo)
#     <workspace>/scolta-python   (the binding)
#
# The scolta-python checkout assumes it lives under the same owner as this repo.
# Override the owner/ref via the SCOLTA_PYTHON_REF env if it ever moves, and set
# a CI_PAT secret if either repo is private (the default GITHUB_TOKEN cannot read
# a second repository).
env:
  SCOLTA_PYTHON_REPO: ${{ github.repository_owner }}/scolta-python
  SCOLTA_PYTHON_REF: main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Both ends of the supported Django range (floor 4.2 was untested).
        django-version: ["4.2", "5.2"]
        exclude:
          # Django 4.2 does not support Python 3.13.
          - python-version: "3.13"
            django-version: "4.2"
    steps:
      - name: Check out scolta-django
        uses: actions/checkout@v4
        with:
          path: scolta-django

      - name: Check out scolta-python (sibling, for the path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SCOLTA_PYTHON_REPO }}
          ref: ${{ env.SCOLTA_PYTHON_REF }}
          path: scolta-python
          token: ${{ secrets.CI_PAT || github.token }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        working-directory: scolta-django
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Pin Django (and a compatible Wagtail) to the matrix version
        working-directory: scolta-django
        # The lock resolves Wagtail 7.x, which needs Django >= 5.2 — the 4.2
        # row pairs the floor with Wagtail 6.3 LTS (the last 4.2-compatible line).
        run: |
          if [ "${{ matrix.django-version }}" = "4.2" ]; then
            uv pip install "wagtail~=6.3.0" "Django~=4.2.0"
          else
            uv pip install "Django~=${{ matrix.django-version }}.0"
          fi

      - name: Lint (ruff)
        working-directory: scolta-django
        run: uv run ruff check .

      - name: Format (ruff format --check)
        working-directory: scolta-django
        run: uv run ruff format --check .

      - name: Test (pytest)
        working-directory: scolta-django
        run: uv run pytest -q
